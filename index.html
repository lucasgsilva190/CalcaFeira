<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Calculadora da Feira</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  </head>
  <body class="theme-vercel">
    <div id="toastContainer" class="toast-container" aria-live="polite" aria-atomic="true"></div>
    <main class="app-shell">
      <header class="topbar">
        <div class="brand-block">
          <span class="brand-mark" aria-hidden="true"></span>
          <div>
            <p class="eyebrow">Workspace pessoal</p>
            <h1>Calculadora da Feira</h1>
          </div>
        </div>
        <div style="display: flex; gap: 0.8rem; align-items: center;">
          <button type="button" class="btn btn-ghost sort-btn-inactive" id="sortBtn" aria-label="Alternar ordenação" title="Ordenação: Adição"><span class="sort-indicator"></span>A↔Z</button>
          <div class="items-count-chip" aria-live="polite" aria-atomic="true">
            <span>Itens</span>
            <strong id="itemsCount">0</strong>
          </div>
          <div class="total-chip" aria-live="polite" aria-atomic="true">
            <span>Total atual</span>
            <strong id="grandTotal">R$ 0,00</strong>
          </div>
        </div>
      </header>

      <section class="card form-card">
        <div class="card-head">
          <h2 id="formTitle">Adicionar item</h2>
          <p>Atualização instantânea de subtotal e total</p>
        </div>
        <form id="itemForm" novalidate>
          <input type="hidden" id="itemId" />

          <div class="form-group">
            <label for="name">Nome do item</label>
            <input
              id="name"
              name="name"
              type="text"
              placeholder="Ex: Tomate"
              autocomplete="off"
              required
              maxlength="60"
            />
            <span class="error-message" id="nameError"></span>
          </div>

          <div class="row-2">
            <div class="form-group">
              <label for="quantity">Quantidade</label>
              <input
                id="quantity"
                name="quantity"
                type="number"
                inputmode="numeric"
                min="1"
                step="1"
                placeholder="0"
                required
              />
              <span class="error-message" id="quantityError"></span>
            </div>
            <div class="form-group">
              <label for="unitPrice">Valor unitário</label>
              <input
                id="unitPrice"
                name="unitPrice"
                type="text"
                inputmode="decimal"
                placeholder="R$ 0,00"
                required
              />
              <span class="error-message" id="unitPriceError"></span>
            </div>
          </div>

          <div class="preview-row">
            <span>Subtotal do item</span>
            <strong id="itemSubtotal">R$ 0,00</strong>
          </div>

          <div class="actions">
            <button type="button" class="btn btn-ghost hidden" id="cancelEdit">Cancelar</button>
            <button type="submit" class="btn btn-primary" id="submitBtn">Adicionar</button>
          </div>
        </form>
      </section>

      <section class="actions-section">
        <button type="button" class="btn btn-ghost" id="clearAllBtn" aria-label="Limpar lista" title="Remover todos os itens">🗑️ Limpar Lista</button>
        <button type="button" class="btn btn-success" id="generateReceiptBtn" aria-label="Gerar nota" title="Gerar nota fiscal em PDF" style="display: none;">📄 Gerar Nota Fiscal</button>
      </section>

      <section class="list-section">
        <div id="emptyState" class="empty-state">
          <div class="empty-icon" aria-hidden="true">0 itens</div>
          <p>Sua lista esta vazia</p>
          <small>Comece adicionando o primeiro item para calcular sua compra.</small>
        </div>
        <ul id="itemsList" class="items-list" aria-live="polite"></ul>
      </section>
    </main>

    <template id="itemTemplate">
      <li class="item-card">
        <button class="item-main" type="button">
          <div class="item-title-row">
            <h3 class="item-name"></h3>
            <span class="item-total"></span>
          </div>
          <p class="item-details"></p>
        </button>
        <button class="delete-btn" type="button" aria-label="Remover item">Excluir</button>
      </li>
    </template>

    <script>
      const STORAGE_KEY = "shopping_list_v1";
      const state = { items: [], sortAlphabetically: false };

      // Sistema de Notificações
      function showToast(message, type = 'success', duration = 3000) {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = `toast toast-${type}`;
        toast.textContent = message;
        toast.setAttribute('role', 'status');
        container.appendChild(toast);

        setTimeout(() => toast.classList.add('show'), 10);
        setTimeout(() => {
          toast.classList.remove('show');
          setTimeout(() => toast.remove(), 300);
        }, duration);
      }

      const refs = {
        form: document.getElementById("itemForm"),
        formTitle: document.getElementById("formTitle"),
        submitBtn: document.getElementById("submitBtn"),
        cancelEdit: document.getElementById("cancelEdit"),
        clearAllBtn: document.getElementById("clearAllBtn"),
        generateReceiptBtn: document.getElementById("generateReceiptBtn"),
        id: document.getElementById("itemId"),
        name: document.getElementById("name"),
        quantity: document.getElementById("quantity"),
        unitPrice: document.getElementById("unitPrice"),
        itemSubtotal: document.getElementById("itemSubtotal"),
        grandTotal: document.getElementById("grandTotal"),
        itemsList: document.getElementById("itemsList"),
        emptyState: document.getElementById("emptyState"),
        template: document.getElementById("itemTemplate"),
        sortBtn: document.getElementById("sortBtn"),
      };

      function formatBRL(cents) {
        return (cents / 100).toLocaleString("pt-BR", {
          style: "currency",
          currency: "BRL",
        });
      }

      function digitsToCurrencyInput(rawValue) {
        const digits = rawValue.replace(/\D/g, "");
        const cents = Number(digits || "0");
        return `R$ ${new Intl.NumberFormat("pt-BR", {
          minimumFractionDigits: 2,
          maximumFractionDigits: 2,
        }).format(cents / 100)}`;
      }

      function parseCurrencyInput(value) {
        const digits = value.replace(/\D/g, "");
        return Number(digits || "0");
      }

      function uid() {
        return `${Date.now()}-${Math.random().toString(36).slice(2, 8)}`;
      }

      function save() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state.items));
      }

      function load() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          state.items = raw ? JSON.parse(raw) : [];
        } catch {
          state.items = [];
        }
      }

      function getFormData() {
        const name = refs.name.value.trim();
        const quantity = Number(refs.quantity.value);
        const unitPriceCents = parseCurrencyInput(refs.unitPrice.value);
        return { name, quantity, unitPriceCents };
      }

      function updateSubtotalPreview() {
        const { quantity, unitPriceCents } = getFormData();
        const subtotal = Math.max(0, quantity || 0) * unitPriceCents;
        refs.itemSubtotal.textContent = formatBRL(subtotal);
      }

      function setEditingMode(editing) {
        refs.formTitle.textContent = editing ? "Editar item" : "Adicionar item";
        refs.submitBtn.textContent = editing ? "Salvar alteracoes" : "Adicionar";
        refs.cancelEdit.classList.toggle("hidden", !editing);
      }

      function clearForm() {
        refs.id.value = "";
        refs.form.reset();
        refs.unitPrice.value = "R$ 0,00";
        setEditingMode(false);
        updateSubtotalPreview();
      }

      function startEdit(itemId) {
        const item = state.items.find((entry) => entry.id === itemId);
        if (!item) return;
        refs.id.value = item.id;
        refs.name.value = item.name;
        refs.quantity.value = item.quantity;
        refs.unitPrice.value = digitsToCurrencyInput(String(item.unitPriceCents));
        setEditingMode(true);
        updateSubtotalPreview();
        refs.name.focus();
      }

      function removeItem(itemId) {
        const card = refs.itemsList.querySelector(`[data-id="${itemId}"]`);
        if (card) {
          card.classList.add("remove");
          setTimeout(() => {
            state.items = state.items.filter((entry) => entry.id !== itemId);
            save();
            render();
            showToast('✓ Item removido com sucesso', 'success', 2000);
          }, 220);
          return;
        }
        state.items = state.items.filter((entry) => entry.id !== itemId);
        save();
        render();
      }

      function clearAllItems() {
        if (state.items.length === 0) {
          showToast('Nenhum item para remover', 'info');
          return;
        }
        if (confirm(`Deseja remover todos os ${state.items.length} itens? Esta ação não pode ser desfeita.`)) {
          state.items = [];
          save();
          render();
          showToast('✓ Lista limpa com sucesso', 'success');
        }
      }

      function validateForm() {
        const { name, quantity, unitPriceCents } = getFormData();
        let isValid = true;

        // Validar nome
        if (!name.trim()) {
          document.getElementById('nameError').textContent = 'Nome é obrigatório';
          refs.name.classList.add('input-error');
          isValid = false;
        } else {
          document.getElementById('nameError').textContent = '';
          refs.name.classList.remove('input-error');
        }

        // Validar quantidade
        if (!Number.isFinite(quantity) || quantity < 1) {
          document.getElementById('quantityError').textContent = 'Quantidade deve ser maior que 0';
          refs.quantity.classList.add('input-error');
          isValid = false;
        } else {
          document.getElementById('quantityError').textContent = '';
          refs.quantity.classList.remove('input-error');
        }

        // Validar preço
        if (unitPriceCents < 1) {
          document.getElementById('unitPriceError').textContent = 'Preço deve ser maior que R$ 0,00';
          refs.unitPrice.classList.add('input-error');
          isValid = false;
        } else {
          document.getElementById('unitPriceError').textContent = '';
          refs.unitPrice.classList.remove('input-error');
        }

        return isValid;
      }

      function checkDuplicateItem(itemName) {
        return state.items.find((item) => 
          item.name.toLowerCase().trim() === itemName.toLowerCase().trim()
        );
      }

      function upsertItem(event) {
        event.preventDefault();
        const currentId = refs.id.value;
        const data = getFormData();

        if (!validateForm()) {
          showToast('❌ Verifique os erros do formulário', 'error', 3000);
          return;
        }

        // Se não está em modo de edição, verificar duplicatas
        if (!currentId) {
          const existingItem = checkDuplicateItem(data.name);
          if (existingItem) {
            const message = `Já existe um item chamado "${data.name}" na lista.\n\nDeseja atualizar este item ao invés de criar um novo?`;
            if (confirm(message)) {
              startEdit(existingItem.id);
              showToast('📝 Aberto para edição. Atualize e salve', 'info', 3000);
              return;
            } else {
              showToast('❌ Item não foi adicionado (item duplicado)', 'error', 3000);
              return;
            }
          }
        }

        if (currentId) {
          state.items = state.items.map((entry) =>
            entry.id === currentId ? { ...entry, ...data } : entry
          );
          showToast('✓ Item atualizado com sucesso', 'success', 2000);
        } else {
          state.items.unshift({ id: uid(), ...data });
          showToast('✓ Item adicionado com sucesso', 'success', 2000);
        }

        save();
        render();
        clearForm();
      }

      function generateReceiptPDF() {
        if (state.items.length === 0) {
          showToast('❌ Adicione itens para gerar a nota', 'error', 3000);
          return;
        }

        const now = new Date();
        const dateStr = now.toLocaleDateString('pt-BR');
        const timeStr = now.toLocaleTimeString('pt-BR');
        const receiptId = `${now.getFullYear()}${String(now.getMonth() + 1).padStart(2, '0')}${String(now.getDate()).padStart(2, '0')}${String(now.getHours()).padStart(2, '0')}${String(now.getMinutes()).padStart(2, '0')}`;

        let itemsHTML = '';
        let total = 0;

        state.items.forEach((item) => {
          const subtotal = item.quantity * item.unitPriceCents;
          total += subtotal;
          const itemSubtotal = formatBRL(subtotal);
          
          itemsHTML += `
            <tr>
              <td style="padding: 2px 0; font-size: 9px; word-break: break-word; text-align: left;">${item.name}</td>
              <td style="padding: 2px 0; font-size: 9px; text-align: center;">x${item.quantity}</td>
              <td style="padding: 2px 0; font-size: 9px; text-align: right;">${itemSubtotal}</td>
            </tr>`;
        });

        // Criar elemento para PDF
        const receiptElement = document.createElement('div');
        receiptElement.style.width = '280px';
        receiptElement.style.margin = '0 auto';
        receiptElement.style.fontFamily = "'Courier New', monospace";
        receiptElement.style.backgroundColor = '#fff';
        receiptElement.style.color = '#000';
        receiptElement.style.padding = '0';
        receiptElement.style.boxSizing = 'border-box';

        receiptElement.innerHTML = `
          <div style="text-align: center; padding: 8px; border-bottom: 2px dashed #000;">
            <div style="font-size: 14px; font-weight: bold; margin-bottom: 2px;">🛒 FEIRA EXPRESS</div>
            <div style="font-size: 8px;">Mercado da Comunidade</div>
            <div style="font-size: 7px; margin-top: 2px;">CNPJ: 00.000.000/0000-00</div>
          </div>
          
          <div style="border-bottom: 1px dashed #000; padding: 6px 8px; font-size: 8px; line-height: 1.4; text-align: center;">
            <div>Data: ${dateStr}</div>
            <div>Hora: ${timeStr}</div>
            <div>ID: ${receiptId}</div>
          </div>

          <div style="padding: 6px 8px;">
            <div style="border-bottom: 1px dashed #000; padding-bottom: 4px; margin-bottom: 4px; text-align: center;">
              <table style="width: 100%; border-collapse: collapse; margin: 0 auto;">
                <thead>
                  <tr style="border-bottom: 1px dashed #000;">
                    <th style="text-align: left; font-size: 8px; font-weight: bold; padding-bottom: 3px;">ITEM</th>
                    <th style="text-align: center; font-size: 8px; font-weight: bold; padding-bottom: 3px;">QTD</th>
                    <th style="text-align: right; font-size: 8px; font-weight: bold; padding-bottom: 3px;">VALOR</th>
                  </tr>
                </thead>
                <tbody>
                  ${itemsHTML}
                </tbody>
              </table>
            </div>
            
            <div style="border-top: 2px dashed #000; padding-top: 4px; margin-top: 4px; text-align: center;">
              <div style="font-weight: bold; font-size: 10px;">
                TOTAL: ${formatBRL(total)}
              </div>
            </div>
          </div>

          <div style="text-align: center; border-top: 1px dashed #000; padding: 8px; font-size: 8px;">
            <div>✓ Obrigado pela compra!</div>
            <div>Volte sempre! 😊</div>
          </div>
        `;

        const opt = {
          margin: 2,
          filename: `nota-feira-${receiptId}.pdf`,
          image: { type: 'jpeg', quality: 0.95 },
          html2canvas: { scale: 2, backgroundColor: '#fff' },
          jsPDF: { unit: 'mm', format: 'a6', orientation: 'portrait' }
        };

        html2pdf().set(opt).from(receiptElement).save();
        showToast('✓ Nota fiscal gerada com sucesso!', 'success', 3000);
      }

      function render() {
        refs.itemsList.innerHTML = "";
        const total = state.items.reduce(
          (sum, item) => sum + item.quantity * item.unitPriceCents,
          0
        );
        refs.grandTotal.textContent = formatBRL(total);
        refs.emptyState.classList.toggle("hidden", state.items.length > 0);
        refs.generateReceiptBtn.style.display = state.items.length > 0 ? "block" : "none";
        updateItemsCounter();

        const itemsToRender = state.sortAlphabetically
          ? [...state.items].sort((a, b) => a.name.localeCompare(b.name, "pt-BR"))
          : state.items;

        itemsToRender.forEach((item) => {
          const subtotal = item.quantity * item.unitPriceCents;
          const node = refs.template.content.firstElementChild.cloneNode(true);
          node.dataset.id = item.id;
          node.classList.add("add");
          node.querySelector(".item-name").textContent = item.name;
          node.querySelector(".item-total").textContent = formatBRL(subtotal);
          node.querySelector(".item-details").textContent = `${item.quantity} x ${formatBRL(
            item.unitPriceCents
          )}`;
          node.querySelector(".item-main").addEventListener("click", () => startEdit(item.id));
          node.querySelector(".delete-btn").addEventListener("click", () => removeItem(item.id));
          refs.itemsList.appendChild(node);
        });
      }

      function toggleSort() {
        state.sortAlphabetically = !state.sortAlphabetically;
        localStorage.setItem("sort_mode", JSON.stringify(state.sortAlphabetically));
        updateSortButtonUI();
        render();
      }

      function updateSortButtonUI() {
        const label = state.sortAlphabetically ? "Ordenação: Alfabética" : "Ordenação: Adição";
        refs.sortBtn.title = label;
        if (state.sortAlphabetically) {
          refs.sortBtn.classList.remove("sort-btn-inactive");
          refs.sortBtn.classList.add("sort-btn-active");
        } else {
          refs.sortBtn.classList.remove("sort-btn-active");
          refs.sortBtn.classList.add("sort-btn-inactive");
        }
      }

      function updateItemsCounter() {
        document.getElementById("itemsCount").textContent = state.items.length;
      }

      refs.form.addEventListener("submit", upsertItem);
      refs.cancelEdit.addEventListener("click", clearForm);
      refs.sortBtn.addEventListener("click", toggleSort);
      refs.clearAllBtn.addEventListener("click", clearAllItems);
      refs.generateReceiptBtn.addEventListener("click", generateReceiptPDF);
      refs.unitPrice.addEventListener("input", (event) => {
        event.target.value = digitsToCurrencyInput(event.target.value);
        updateSubtotalPreview();
      });
      refs.quantity.addEventListener("input", updateSubtotalPreview);
      refs.name.addEventListener("input", updateSubtotalPreview);

      load();
      const sortMode = localStorage.getItem("sort_mode");
      if (sortMode !== null) {
        state.sortAlphabetically = JSON.parse(sortMode);
      }
      updateSortButtonUI();
      updateItemsCounter();
      clearForm();
      render();
    </script>
  </body>
</html>
